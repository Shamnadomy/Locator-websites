<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager Module — Locator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300..900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;-webkit-font-smoothing:antialiased;color:#1e293b}

/* ===== SHOWCASE SHELL ===== */
.tm-showcase{max-width:1320px;margin:0 auto;padding:32px 20px 48px}
.tm-showcase-head{text-align:center;margin-bottom:28px}
.tm-showcase-head .tm-tag{display:inline-block;font-size:12px;font-weight:800;letter-spacing:.06em;color:#4F6EF7;text-transform:uppercase;margin-bottom:10px}
.tm-showcase-head h2{font-size:clamp(26px,3.6vw,42px);font-weight:800;letter-spacing:-.03em;line-height:1.1;text-wrap:balance}

/* ===== TABS ===== */
.tm-tabs{display:flex;gap:4px;padding:4px;background:#e6eaf1;border-radius:14px;width:fit-content;margin:0 auto 26px}
.tm-tab{display:flex;align-items:center;gap:7px;padding:10px 26px;border-radius:11px;border:none;background:transparent;font-family:inherit;font-size:13.5px;font-weight:600;color:#64748b;cursor:pointer;transition:all .2s ease;white-space:nowrap}
.tm-tab:hover{color:#334155}
.tm-tab.active{background:#fff;color:#4F6EF7;box-shadow:0 1px 4px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)}
.tm-tab svg{width:16px;height:16px;flex-shrink:0}

/* ===== WEB DASHBOARD ===== */
.tm-web{display:grid;grid-template-columns:1fr;max-width:960px;margin:0 auto;height:640px;border:1px solid #dce1e8;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 6px 32px -8px rgba(30,41,59,.1),0 1px 2px rgba(0,0,0,.04);position:relative}

/* Staff panel */
.tm-staff-panel{background:#f8fafc;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden}
.tm-panel-tab{display:flex;align-items:center;gap:5px;font-family:inherit;font-size:12px;font-weight:600;color:#94a3b8;border:none;background:none;cursor:pointer;padding:6px 10px;border-radius:7px;transition:.15s ease;white-space:nowrap}
.tm-panel-tab:hover{color:#64748b;background:#eef2f7}
.tm-panel-tab.active{color:#4F6EF7;background:#ebf0ff}
.tm-staff-list{flex:1;overflow-y:auto;padding:6px 6px}
.tm-staff-list::-webkit-scrollbar{width:4px}
.tm-staff-list::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
.tm-staff-card{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:all .15s ease;margin-bottom:1px}
.tm-staff-card:hover{background:#eef2f7}
.tm-staff-card.selected{background:#ebf0ff;box-shadow:inset 3px 0 0 #4F6EF7}

/* Avatar */
.tm-avatar{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}

/* Task panel */
.tm-task-panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #e2e8f0}
.tm-toolbar-btn{font-family:inherit;font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:7px;border:1px solid #e2e8f0;background:#fff;color:#475569;cursor:pointer;transition:.15s ease;white-space:nowrap}
.tm-toolbar-btn:hover{background:#f1f5f9}
.tm-toolbar-btn.primary{background:#4F6EF7;color:#fff;border-color:#4F6EF7}
.tm-task-list-scroll{flex:1;overflow-y:auto;padding:6px 12px}
.tm-task-list-scroll::-webkit-scrollbar{width:4px}
.tm-task-list-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}

/* Task row */
.tm-task-row{display:flex;gap:10px;align-items:center;padding:12px 14px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:all .15s ease;margin-bottom:2px}
.tm-task-row:hover{background:#f8fafc;border-color:#e2e8f0}
.tm-task-row.selected{background:#ebf0ff;border-color:#c7d2fe}
.tm-task-badge{background:#4F6EF7;color:#fff;font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:6px;white-space:nowrap;flex-shrink:0}

/* Status badge */
.tm-status{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;position:relative;transition:transform .15s ease;white-space:nowrap;user-select:none}
.tm-status:hover{transform:scale(1.05)}
.tm-status-dropdown{position:absolute;top:calc(100% + 4px);right:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:4px;box-shadow:0 10px 30px -8px rgba(0,0,0,.16);z-index:60;min-width:145px}
.tm-status-option{display:flex;align-items:center;gap:7px;padding:7px 11px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:background .1s ease;border:none;background:transparent;width:100%;font-family:inherit;text-align:left}
.tm-status-option:hover{background:#f1f5f9}

/* Detail panel — right side panel */
.tm-detail-side{background:#f8fafc;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid #e2e8f0;animation:tmSlideIn .25s ease}
.tm-detail-action{width:28px;height:28px;border-radius:7px;border:1px solid #e2e8f0;background:#fff;display:grid;place-items:center;cursor:pointer;color:#64748b;transition:all .15s ease;font-size:13px;padding:0}
.tm-detail-action:hover{background:#ebf0ff;color:#4F6EF7;border-color:#c7d2fe}
.tm-detail-scroll{flex:1;overflow-y:auto;padding:16px}
.tm-detail-scroll::-webkit-scrollbar{width:4px}
.tm-detail-scroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}

/* ===== MOBILE ===== */
.tm-phone{width:278px;height:570px;background:#111;border-radius:36px;padding:8px;box-shadow:0 30px 60px -12px rgba(0,0,0,.22),0 18px 36px -18px rgba(0,0,0,.28),inset 0 0 0 1.5px rgba(255,255,255,.08);position:relative;flex-shrink:0}
.tm-phone-screen{width:100%;height:100%;background:#f0f4f8;border-radius:30px;overflow:hidden;display:flex;flex-direction:column;position:relative}

/* Mobile cards */
.tm-mobile-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s ease}
.tm-mobile-card:active{transform:scale(.98)}

/* Photo upload */
.tm-photo-drop{border:1.5px dashed #cbd5e1;border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .15s ease;background:#fff}
.tm-photo-drop:hover,.tm-photo-drop.dragover{border-color:#4F6EF7;background:#f5f7ff}

/* Animations */
@keyframes tmSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes tmSlideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes tmFadeIn{from{opacity:0}to{opacity:1}}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){
  .tm-web{height:580px}
}
@media(max-width:900px){
  .tm-web{height:auto}
  .tm-task-panel{min-height:300px}
}
</style>
</head>
<body>

<div id="tm-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tm-data.jsx"></script>
<script type="text/babel" src="tm-web.jsx"></script>
<script type="text/babel" src="tm-mobile.jsx"></script>

<script type="text/babel">
const { useState } = React;

function TMShowcaseApp() {
  const [tab, setTab] = useState('web');

  return (
    <TMProvider>
      <div className="tm-showcase">
        <div className="tm-showcase-head">
          <div className="tm-tag">Module</div>
          <h2>Task Manager Module</h2>
        </div>
        <div className="tm-tabs">
          <button className={`tm-tab${tab==='web'?' active':''}`} onClick={() => setTab('web')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            Web Dashboard
          </button>
          <button className={`tm-tab${tab==='mobile'?' active':''}`} onClick={() => setTab('mobile')}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
            Mobile App
          </button>
        </div>
        <div style={{ animation:'tmFadeIn 0.3s ease' }} key={tab}>
          {tab === 'web' ? <TMWebDashboard /> : <TMMobileApp />}
        </div>
      </div>
    </TMProvider>
  );
}

ReactDOM.createRoot(document.getElementById('tm-root')).render(<TMShowcaseApp />);
</script>
</body>
</html>
